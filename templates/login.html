<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Authentication - AttendAI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-body">
    
    <div class="glass-card login-card">
        <div class="login-logo">
            <i class="fas fa-user-check"></i>
            <div>AttendAI</div>
        </div>
        
        <form action="{{ url_for('login') }}" method="POST">
            <h2 style="font-weight: 600; margin-bottom: 24px; text-align: center; font-size: 1.5rem;">Teacher Access</h2>
            
            <div class="form-group">
                <label for="username">Username</label>
                <div style="position: relative;">
                    <i class="fas fa-user" style="position: absolute; left: 16px; top: 16px; color: var(--text-secondary);"></i>
                    <input type="text" id="username" name="username" class="form-control" style="padding-left: 44px;" placeholder="Enter username" required autocomplete="off">
                </div>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <div style="position: relative;">
                    <i class="fas fa-lock" style="position: absolute; left: 16px; top: 16px; color: var(--text-secondary);"></i>
                    <input type="password" id="password" name="password" class="form-control" style="padding-left: 44px;" placeholder="Enter password" required>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px; height: 50px;">
                <i class="fas fa-sign-in-alt"></i> Log In Securely
            </button>
        </form>
        
        <div style="margin-top: 24px; text-align: center; font-size: 0.85rem; color: var(--text-secondary);">
            <span>Default demo credentials:</span><br>
            <strong style="color: var(--primary);">admin</strong> / <strong style="color: var(--primary);">password123</strong>
        </div>
    </div>

    <!-- Toast container for notifications -->
    <div class="toast-container"></div>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <script>
          document.addEventListener('DOMContentLoaded', () => {
            {% for category, message in messages %}
              showToast("{{ message }}", "{{ 'error' if category in ['danger', 'error'] else 'success' }}");
            {% endfor %}
          });
        </script>
      {% endif %}
    {% endwith %}
</body>
</html>
